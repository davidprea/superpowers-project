databases:
  - name: superpowers-db
    plan: free
    databaseName: superpowers
    user: superpowers

services:
  - type: web
    name: superpowers-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node db/migrate.js && node index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: superpowers-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@superpowersproject.org
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  - type: web
    name: superpowers-frontend
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: superpowers-api
          property: host
